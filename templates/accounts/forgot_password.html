{% extends "accounts/base.html" %} 
{% block title %} Reset Password 
{% endblock%} 

{% block content %}

<main class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <!-- CARD -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-8">
      <!-- HEADER -->
      <div class="text-center mb-8">
        <div
          class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-5"
        >
          <span class="material-symbols-outlined text-white text-3xl">
            lock_reset
          </span>
        </div>

        <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>

        <p class="text-gray-500 text-sm mt-2">
          Password recovery will be available here.
        </p>
      </div>

      <!-- MESSAGE -->
      <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-6">
        <p class="text-sm text-gray-600 text-center">
          Password reset functionality will be implemented here.
        </p>
      </div>

      <!-- BUTTON -->
      <a
        href="{% url 'login' %}"
        class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium transition"
      >
        Back to Login
      </a>
    </div>
  </div>
</main>

{% endblock %}
