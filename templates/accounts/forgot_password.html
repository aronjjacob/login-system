{% extends "accounts/base.html" %}

{% block title %}
    Forgot Password
{% endblock %}


{% block content %}

<main class="min-h-screen flex items-center justify-center px-4 py-12">

    <section class="w-full max-w-md">

        <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-8">


            <header class="text-center mb-8">

                <div
                    class="w-14 h-14 bg-primary rounded-full flex items-center justify-center mx-auto mb-5"
                >

                    <span class="material-symbols-outlined text-white text-3xl">
                        lock_reset
                    </span>

                </div>


                <h1 class="text-2xl font-semibold text-gray-900">
                    Reset Password
                </h1>


                <p class="text-sm text-gray-500 mt-2">
                    Enter your email address to receive a password reset link.
                </p>

            </header>



            <form
                method="POST"
                action="{% url 'forgot_password' %}"
                class="space-y-5"
            >

                {% csrf_token %}


                <!-- EMAIL -->

                <div>

                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email Address
                    </label>


                    <input
                        name="email"
                        type="email"
                        autocomplete="email"
                        required
                        placeholder="example@email.com"
                        class="w-full h-11 px-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    >

                </div>



                <button
                    type="submit"
                    class="w-full h-11 bg-primary hover:bg-primaryHover text-white font-semibold rounded-lg transition"
                >
                    SEND RESET LINK
                </button>


            </form>



            <footer class="border-t border-gray-100 mt-6 pt-5 text-center text-sm">

                <span class="text-gray-600">
                    Remember your password?
                </span>


                <a
                    href="{% url 'login' %}"
                    class="text-blue-600 font-semibold hover:underline"
                >
                    Login
                </a>

            </footer>


        </div>

    </section>

</main>


{% endblock %}
