{% extends "accounts/base.html" %}

{% block title %}
    Password Reset Complete
{%endblock %} 

{% block content %}

<div class="min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow w-full max-w-md text-center">
    <h2 class="text-2xl font-bold mb-3">Password Reset Successful</h2>

    <p class="text-gray-600">Your password has been changed successfully.</p>

    <a
      href="{% url 'login' %}"
      class="mt-6 inline-block bg-blue-600 text-white px-5 py-2 rounded-lg"
    >
      Login
    </a>
  </div>
</div>

{% endblock %}
