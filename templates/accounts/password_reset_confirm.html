{% extends "accounts/base.html" %}

{% block title %}
    Set New Password 
{%endblock %} 

{% block content %}

<main class="min-h-screen flex items-center justify-center px-4 py-12">
  <section class="w-full max-w-md">
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-8">
      <header class="text-center mb-8">
        <div
          class="w-14 h-14 bg-primary rounded-full flex items-center justify-center mx-auto mb-5"
        >
          <span class="material-symbols-outlined text-white text-3xl">
            lock_reset
          </span>
        </div>

        <h1 class="text-2xl font-semibold text-gray-900">Set New Password</h1>

        <p class="text-sm text-gray-500 mt-2">
          Create a new secure password for your account
        </p>
      </header>

      <form method="POST">
        {% csrf_token %}

        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-2">
            New Password
          </label>

          <input
            type="password"
            name="new_password1"
            required
            placeholder="Enter new password"
            class="w-full h-11 px-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>

        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Confirm New Password
          </label>

          <input
            type="password"
            name="new_password2"
            required
            placeholder="Confirm new password"
            class="w-full h-11 px-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>

        {% if form.errors %}

        <div class="text-sm text-red-600 mb-4">{{ form.errors }}</div>

        {% endif %}

        <button
          type="submit"
          class="w-full h-11 bg-primary hover:bg-primaryHover text-white font-semibold rounded-lg transition"
        >
          UPDATE PASSWORD
        </button>
      </form>
    </div>
  </section>
</main>

{% endblock %}
